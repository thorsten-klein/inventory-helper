<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Stock Inventory Review</title>

    <!-- Styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/upload.css">
    <link rel="stylesheet" href="css/category.css">
    <link rel="stylesheet" href="css/editor.css">
    <link rel="stylesheet" href="css/review.css">
    <link rel="stylesheet" href="css/report.css">
</head>
<body>
    <div id="app">
        <!-- Upload & Configuration Screen -->
        <div id="upload-screen" class="screen">
            <div class="container">
                <h1 id="upload-title">Stock Inventory Review</h1>

                <div class="language-selector">
                    <button id="lang-en" class="flag-btn" data-lang="en" title="English">
                        <svg width="32" height="24" viewBox="0 0 32 24">
                            <rect width="32" height="24" fill="#012169"/>
                            <path d="M0 0 L32 24 M32 0 L0 24" stroke="#fff" stroke-width="4.8"/>
                            <path d="M0 0 L32 24 M32 0 L0 24" stroke="#C8102E" stroke-width="3.2"/>
                            <path d="M16 0 V24 M0 12 H32" stroke="#fff" stroke-width="8"/>
                            <path d="M16 0 V24 M0 12 H32" stroke="#C8102E" stroke-width="4.8"/>
                        </svg>
                    </button>
                    <button id="lang-de" class="flag-btn" data-lang="de" title="Deutsch">
                        <svg width="32" height="24" viewBox="0 0 32 24">
                            <rect width="32" height="8" fill="#000"/>
                            <rect y="8" width="32" height="8" fill="#D00"/>
                            <rect y="16" width="32" height="8" fill="#FFCE00"/>
                        </svg>
                    </button>
                </div>

                <div class="upload-section">
                    <label for="file-input" class="file-upload-btn" id="file-upload-label">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        Choose XLSX File
                    </label>
                    <input type="file" id="file-input" accept=".xlsx,.xls" hidden>
                    <p id="file-name" class="file-name"></p>

                    <div id="loading-progress" class="loading-progress hidden">
                        <p id="loading-text" class="loading-text">Loading file...</p>
                        <div class="progress-bar">
                            <div id="progress-fill" class="progress-fill"></div>
                        </div>
                    </div>
                </div>

                <div id="config-section" class="config-section hidden">
                    <h2>Column Configuration</h2>

                    <div class="config-grid">
                        <div class="config-item">
                            <label for="col-category">Categories</label>
                            <select id="col-category" class="column-select"></select>
                        </div>

                        <div class="config-item">
                            <label for="col-ean">EAN</label>
                            <select id="col-ean" class="column-select"></select>
                        </div>

                        <div class="config-item">
                            <label for="col-shelf">Shelf</label>
                            <select id="col-shelf" class="column-select"></select>
                        </div>

                        <div class="config-item">
                            <label for="col-row">Row</label>
                            <select id="col-row" class="column-select"></select>
                        </div>

                        <div class="config-item">
                            <label for="col-position">Position</label>
                            <select id="col-position" class="column-select"></select>
                        </div>

                        <div class="config-item">
                            <label for="col-article">Article Number</label>
                            <select id="col-article" class="column-select"></select>
                        </div>

                        <div class="config-item">
                            <label for="col-price">Price</label>
                            <select id="col-price" class="column-select"></select>
                        </div>

                        <div class="config-item">
                            <label for="col-stock">Stock</label>
                            <select id="col-stock" class="column-select"></select>
                        </div>
                    </div>

                    <button id="btn-next-category" class="btn btn-primary btn-large">Next</button>
                </div>
            </div>
        </div>

        <!-- Category Selection Screen -->
        <div id="category-screen" class="screen hidden">
            <div class="container">
                <h1>Select Category</h1>

                <div class="category-selection">
                    <label for="category-select">Choose a category to review:</label>
                    <select id="category-select" class="category-select"></select>
                </div>

                <div class="category-buttons">
                    <button id="btn-back-upload" class="btn btn-back btn-large"></button>
                    <button id="btn-start-editing" class="btn btn-primary btn-large">Start Editing</button>
                </div>
            </div>
        </div>

        <!-- List Editor Screen -->
        <div id="editor-screen" class="screen hidden">
            <div class="container">
                <div class="header-bar">
                    <h1 id="editor-category-name"></h1>
                    <button id="btn-editor-speech-settings" class="btn btn-icon" title="Speech settings">
                        <svg id="editor-speaker-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                            <path id="editor-speaker-waves" d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                        </svg>
                    </button>
                    <button id="btn-add-item" class="btn btn-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>

                <div class="items-list" id="items-list">
                    <!-- Items will be dynamically added here -->
                </div>

                <div id="action-buttons" class="action-buttons">
                    <button id="btn-row-minus" class="btn btn-secondary btn-compact"></button>
                    <button id="btn-row-plus" class="btn btn-secondary btn-compact"></button>
                    <button id="btn-move-up" class="btn btn-secondary btn-compact"></button>
                    <button id="btn-move-down" class="btn btn-secondary btn-compact"></button>
                </div>

                <div class="bottom-buttons">
                    <button id="btn-back-category" class="btn btn-back btn-bottom"></button>
                    <button id="btn-edit-item" class="btn btn-secondary btn-bottom"></button>
                    <button id="btn-start-review" class="btn btn-primary btn-bottom"></button>
                </div>
            </div>
        </div>

        <!-- Review Screen -->
        <div id="review-screen" class="screen hidden">
            <div class="container review-container">
                <h1 id="review-category-name" class="review-heading"></h1>

                <div class="review-content">
                    <div class="review-field-compact">
                        <div id="review-ean" class="review-ean-text"></div>
                        <div id="review-article" class="review-article-text"></div>
                    </div>

                    <div class="stock-section">
                        <label>Stock</label>
                        <div class="stock-wrapper">
                            <div class="stock-counter">
                                <button id="btn-stock-minus" class="btn-stock">-</button>
                                <div id="review-stock" class="stock-value">0</div>
                                <button id="btn-stock-plus" class="btn-stock">+</button>
                            </div>
                            <button id="btn-toggle-speech" class="btn-speaker" title="Toggle speech">
                                <svg id="speaker-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                                    <path id="speaker-waves" d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                                </svg>
                            </button>
                        </div>
                        <div id="stock-diff" class="stock-diff"></div>
                    </div>

                    <div class="review-field-compact">
                        <span id="review-price" class="review-compact-text"></span>
                    </div>

                    <div class="review-field-compact">
                        <span id="review-location" class="review-compact-text"></span>
                    </div>

                    <button id="btn-item-info" class="btn btn-details btn-details-full">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        <span id="btn-details-text"></span>
                    </button>
                </div>

                <div class="review-progress">
                    <span id="review-progress-text">Item 1 of 10</span>
                </div>

                <div class="review-navigation">
                    <button id="btn-review-back" class="btn btn-back btn-nav"></button>
                    <button id="btn-review-prev" class="btn btn-secondary btn-nav"></button>
                    <button id="btn-review-next" class="btn btn-primary btn-nav"></button>
                    <button id="btn-review-finish" class="btn btn-primary btn-nav"></button>
                </div>
            </div>
        </div>

        <!-- Report Screen -->
        <div id="report-screen" class="screen hidden">
            <div class="container">
                <h1 id="report-title"></h1>

                <div class="report-summary">
                    <div class="summary-item">
                        <span class="summary-label" id="summary-total-label"></span>
                        <span id="summary-total" class="summary-value">0</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label" id="summary-changed-label"></span>
                        <span id="summary-changed" class="summary-value">0</span>
                    </div>
                </div>

                <div class="report-legend">
                    <div class="legend-item">
                        <span class="legend-color legend-color-yellow"></span>
                        <span class="legend-text" id="legend-position"></span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color legend-color-red"></span>
                        <span class="legend-text" id="legend-stock"></span>
                    </div>
                </div>

                <div class="report-table-wrapper">
                    <table id="report-table" class="report-table">
                        <thead>
                            <tr>
                                <th id="th-article"></th>
                                <th id="th-ean"></th>
                                <th id="th-shelf"></th>
                                <th id="th-row"></th>
                                <th id="th-pos"></th>
                                <th id="th-stock"></th>
                                <th id="th-diff"></th>
                            </tr>
                        </thead>
                        <tbody id="report-tbody">
                            <!-- Report rows will be added here -->
                        </tbody>
                    </table>
                </div>

                <div class="export-buttons">
                    <button id="btn-export-changes" class="btn btn-secondary btn-large"></button>
                    <button id="btn-export-all" class="btn btn-primary btn-large"></button>
                    <button id="btn-back-review" class="btn btn-back btn-large"></button>
                </div>
            </div>
        </div>

        <!-- Add Type Selection Modal -->
        <div id="add-type-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="add-type-modal-title"></h2>

                <div class="add-type-buttons">
                    <button id="btn-add-shelf-type" class="btn btn-secondary btn-large"></button>
                    <button id="btn-add-item-type" class="btn btn-primary btn-large"></button>
                </div>

                <div class="modal-buttons">
                    <button id="btn-cancel-add-type" class="btn btn-secondary"></button>
                </div>
            </div>
        </div>

        <!-- Add Shelf Modal -->
        <div id="add-shelf-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="add-shelf-modal-title"></h2>

                <div class="form-group">
                    <label for="new-shelf-name" id="new-shelf-name-label"></label>
                    <input type="text" id="new-shelf-name" class="form-input" required>
                </div>

                <div class="modal-buttons">
                    <button id="btn-cancel-add-shelf" class="btn btn-secondary"></button>
                    <button id="btn-save-add-shelf" class="btn btn-primary"></button>
                </div>
            </div>
        </div>

        <!-- Edit/Add Item Modal -->
        <div id="edit-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="edit-modal-title"></h2>

                <div class="form-group">
                    <label for="edit-ean" id="edit-ean-label"></label>
                    <input type="text" id="edit-ean" class="form-input" required>
                </div>

                <div class="form-group">
                    <label for="edit-shelf" id="edit-shelf-label"></label>
                    <select id="edit-shelf" class="form-input">
                        <!-- Options will be populated dynamically -->
                    </select>
                </div>

                <div class="modal-buttons">
                    <button id="btn-cancel-edit" class="btn btn-secondary"></button>
                    <button id="btn-save-edit" class="btn btn-primary"></button>
                </div>
            </div>
        </div>

        <!-- Item Details Modal -->
        <div id="item-details-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="item-details-title"></h2>

                <div class="item-details-table-wrapper">
                    <table class="item-details-table">
                        <tbody id="item-details-tbody">
                            <!-- Details will be populated here -->
                        </tbody>
                    </table>
                </div>

                <div class="modal-buttons">
                    <button id="btn-close-item-details" class="btn btn-secondary"></button>
                </div>
            </div>
        </div>

        <!-- Editor Speech Settings Modal -->
        <div id="editor-speech-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="editor-speech-modal-title"></h2>

                <div class="form-group">
                    <label class="toggle-label">
                        <span id="speech-enable-label"></span>
                        <div class="toggle-switch">
                            <input type="checkbox" id="speech-enabled">
                            <span class="toggle-slider"></span>
                        </div>
                    </label>
                </div>

                <div class="form-group">
                    <label for="speech-article-digits" id="speech-article-label"></label>
                    <input type="number" id="speech-article-digits" class="form-input" min="0" max="20" value="3">
                </div>

                <div class="form-group">
                    <label for="speech-ean-digits" id="speech-ean-label"></label>
                    <input type="number" id="speech-ean-digits" class="form-input" min="0" max="20" value="0">
                </div>

                <div class="modal-buttons">
                    <button id="btn-cancel-speech" class="btn btn-secondary"></button>
                    <button id="btn-save-speech" class="btn btn-primary"></button>
                </div>
            </div>
        </div>
    </div>

    <!-- XLSX Library -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <!-- App Scripts -->
    <script src="js/translations.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/state.js"></script>
    <script src="js/utils/xlsx-parser.js"></script>
    <script src="js/utils/sorter.js"></script>
    <script src="js/utils/exporter.js"></script>
    <script src="js/screens/upload.js"></script>
    <script src="js/screens/category.js"></script>
    <script src="js/screens/editor.js"></script>
    <script src="js/screens/review.js"></script>
    <script src="js/screens/report.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
